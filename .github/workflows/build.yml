name: Build Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller requests rich pyyaml click
      - run: |
          cd harness
          pyinstaller --onefile --name pipelinescore-macos \
            --add-data "tasks/tasks.json:tasks" \
            --add-data "tasks/rubrics.json:tasks" \
            --add-data "harness.py:." \
            launcher.py
      - uses: actions/upload-artifact@v4
        with: { name: macos-binary, path: harness/dist/pipelinescore-macos }

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller requests rich pyyaml click
      - run: |
          cd harness
          pyinstaller --onefile --name pipelinescore `
            --add-data "tasks/tasks.json;tasks" `
            --add-data "tasks/rubrics.json;tasks" `
            --add-data "harness.py;." `
            launcher.py
      - uses: actions/upload-artifact@v4
        with: { name: windows-binary, path: harness/dist/pipelinescore.exe }

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller requests rich pyyaml click
      - run: |
          cd harness
          pyinstaller --onefile --name pipelinescore-linux \
            --add-data "tasks/tasks.json:tasks" \
            --add-data "tasks/rubrics.json:tasks" \
            --add-data "harness.py:." \
            launcher.py
      - uses: actions/upload-artifact@v4
        with: { name: linux-binary, path: harness/dist/pipelinescore-linux }

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            macos-binary/pipelinescore-macos
            windows-binary/pipelinescore.exe
            linux-binary/pipelinescore-linux
