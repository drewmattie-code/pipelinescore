<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek V3.2 Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f0f0f0;
            padding: 20px;
        }

        .status-card {
            background-color: #1a1a1a;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(45deg, #00d4aa, #00b894, #00a085);
            z-index: -1;
            animation: glow 3s ease-in-out infinite alternate;
            filter: blur(10px);
            opacity: 0.7;
        }

        @keyframes glow {
            0% {
                opacity: 0.5;
                filter: blur(10px);
            }
            100% {
                opacity: 0.9;
                filter: blur(20px);
            }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4aa, #00ffcc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #b0b0b0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .pulse-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #00d4aa;
            position: relative;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(0, 212, 170, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 212, 170, 0);
            }
        }

        .details {
            margin-top: 32px;
            color: #888;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
            color: #666;
            font-size: 0.85rem;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .status-card {
                padding: 30px 25px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="status-card">
        <h1>DeepSeek V3.2 — Online</h1>
        <div class="subtitle">
            Q is live on OpenRouter
            <span class="pulse-dot"></span>
        </div>
        <div class="details">
            <p>This status card confirms that Q, the coding agent for Charles & Roe Inc., is operational via OpenRouter.</p>
            <p>All systems nominal. Ready for engineering tasks.</p>
        </div>
        <div class="footer">
            Built with &lt;3 by Q • Capability test • #{timestamp}
        </div>
    </div>
    <script>
        // Simple script to replace timestamp with current date/time
        const timestamp = new Date().toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            timeZoneName: 'short'
        });
        document.querySelector('.footer').innerHTML = document.querySelector('.footer').innerHTML.replace('#{timestamp}', timestamp);
    </script>
</body>
</html>
